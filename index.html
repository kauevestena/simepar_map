<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simepar - Visualizador de Temperatura</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-simepar">
    <header>
        <h1>Simepar - Monitoramento de Temperatura</h1>
    </header>
    <div id="controls">
        <div class="control-group">
            <label for="theme-select">Tema:</label>
            <select id="theme-select">
                <option value="simepar">Simepar</option>
                <option value="light">Claro</option>
                <option value="dark">Escuro</option>
            </select>
        </div>
        <div class="control-group">
            <label for="temp-select">Exibir:</label>
            <select id="temp-select">
                <option value="current">Temperatura Atual</option>
                <option value="max">Temperatura Máxima</option>
                <option value="min">Temperatura Mínima</option>
            </select>
        </div>
    </div>
    <main>
        <div id="map"></div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
